<!doctype html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Setting</title>
</head>
<body>
<input maxlength="64" type="text" id="customToastTextInput" placeholder="%s 已被授予超级用户权限">
<label for="customToastTextInput">自定义提示消息(须带有%s占位符用于显示应用名且长度小于64字符)</label>
<br>
<button id="saveCustomToastText">保存提示消息</button>

<input maxlength="64" type="text" id="customToastCompatModeTextInput" placeholder="%s 已被授予超级用户权限">
<label for="customToastCompatModeTextInput">自定义兼容模式SU提示消息(须带有%s占位符用于显示应用名且长度小于64字符)</label>
<br>
<button id="saveCustomCompatModeToastText">保存提示消息</button>
<br>
<label for="ignorePackageNames">忽略提示的应用包名(以';'分隔)</label><textarea id="ignorePackageNames"
                                                                           placeholder="示例:com.abc.test;com.def.test"
                                                                           style="width:90%;"
maxlength="4096"></textarea>
<br>
<button id="saveIgnorePackageNames">保存忽略包名</button>
<br>
<span>所有更改需重启生效</span>
</body>
<script>
    let customToastTextInputElement;
    let ignorePackageNamesElement;
    let customToastCompatModeTextInputElement;
    window.onLoadCustomMessageConfig=(errno,stdout,stderr)=>{
        if(errno===0){
            customToastTextInputElement.value=stdout;
            return
        }
    };
    window.onLoadIgnorePackageNamesConfig=(errno,stdout,stderr)=>{
        if(errno===0){
            ignorePackageNamesElement.value=stdout;
            return
        }
    };
    window.onLoadCustomCompatModeMessageConfig=(errno,stdout,stderr)=>{
        if(errno===0){
            customToastCompatModeTextInputElement.value=stdout;
            return
        }
    };
    window.addEventListener("load",()=>{
        customToastTextInputElement=document.getElementById("customToastTextInput");
        ignorePackageNamesElement=document.getElementById("ignorePackageNames");
        customToastCompatModeTextInputElement=document.getElementById("customToastCompatModeTextInput");
        ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config get customToastText`,"onLoadCustomMessageConfig")
        ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config get ignorePackageNames`,"onLoadIgnorePackageNamesConfig")
        ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config get customToastCompatModeText`,"onLoadCustomCompatModeMessageConfig")
    });
    document.getElementById("saveCustomToastText").addEventListener("click",()=>{
        //校验
        const tempInputValue=customToastTextInputElement.value;
        if(tempInputValue===""){
            ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config delete customToastText`)
            alert("已恢复默认消息");
            return
        }else if(tempInputValue.length>64||!tempInputValue.includes("%s")){
            alert("消息无效 需带有%s占位符且长度小于64字符");
            return
        }
        ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config set customToastText "${customToastTextInputElement.value}"`);
        alert("保存成功");
    });
    document.getElementById("saveIgnorePackageNames").addEventListener("click",()=>{
        //校验
        let tempInputValue=ignorePackageNamesElement.value;
        if(tempInputValue===""){
            ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config delete ignorePackageNames`)
            alert("已恢复默认配置");
            return
        }
        if(tempInputValue.endsWith(";")){
            tempInputValue=tempInputValue.substring(0,tempInputValue.length-1);
            ignorePackageNamesElement.value=tempInputValue;
        }
        ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config set ignorePackageNames "${ignorePackageNamesElement.value}"`)
        alert("保存成功");
    });
    document.getElementById("saveCustomCompatModeToastText").addEventListener("click",()=>{
        //校验
        const tempInputValue=customToastCompatModeTextInputElement.value;
        if(tempInputValue===""){
            ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config delete customToastCompatModeText`)
            alert("已恢复默认消息");
            return
        }else if(tempInputValue.length>64||!tempInputValue.includes("%s")){
            alert("消息无效 需带有%s占位符且长度小于64字符");
            return
        }
        ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config set customToastCompatModeText "${customToastCompatModeTextInputElement.value}"`);
        alert("保存成功");
    });
</script>
</html>
